name: Description change
description: Suggest a change to shortDescription or longDescription
title: "[Description]: "
labels: ["description-fix"]
body:
  - type: input
    id: term
    attributes:
      label: Term
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current text
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed replacement
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
    validations:
      required: true

